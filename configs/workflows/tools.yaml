# tools.yaml - 工具定义配置
tools:
  - name: get_user_id
    description: 根据用户名查询用户ID（模拟）
    type: mock
    returns: "user-123"
    params:
      - name: user_name
        type: string
        description: 用户名

  - name: get_order_by_user_id
    description: 根据用户ID查询订单信息（模拟）
    type: mock
    returns:
      order_id: "order-456"
      status: "已发货"
    params:
      - name: user_id
        type: string
        description: 用户ID

  - name: get_logistics_by_order_id
    description: 根据订单号查询物流状态（模拟）
    type: mock
    returns: "快递已到达配送站，预计明天送达"
    params:
      - name: order_id
        type: string
        description: 订单号

tool_groups:
  order:
    - get_user_id
    - get_order_by_user_id

  logistics:
    - get_user_id
    - get_order_by_user_id
    - get_logistics_by_order_id
